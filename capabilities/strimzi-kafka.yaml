apiVersion: kr8.ykube.app/v1alpha1
kind: CapabilityDefinition
metadata:
  name: kafka
spec:
  type: messaging
  provider: strimzi-kafka
  versions:
    - version: "0.45.0"
      helm:
        repo: "https://strimzi.io/charts/"
        chart: "strimzi-kafka-operator"
        values: {}
      providerCRTemplate: |
        apiVersion: kafka.strimzi.io/v1beta2
        kind: Kafka
        metadata:
          name: {{ .Name }}
          namespace: {{ .Namespace }}
        spec:
          kafka:
            version: 3.9.0
            replicas: 1
            listeners:
              - name: plain
                port: 9092
                type: internal
                tls: false
              - name: tls
                port: 9093
                type: internal
                tls: true
            config:
              offsets.topic.replication.factor: 1
              transaction.state.log.replication.factor: 1
              transaction.state.log.min.isr: 1
              default.replication.factor: 1
              min.insync.replicas: 1
            storage:
              type: jbod
              volumes:
                - id: 0
                  type: persistent-claim
                  size: 10Gi
                  deleteClaim: false
          zookeeper:
            replicas: 1
            storage:
              type: persistent-claim
              size: 5Gi
              deleteClaim: false
          entityOperator:
            topicOperator: {}
            userOperator: {}
      # Strimzi Kafka CR exposes standard status.conditions[type=Ready]=True,
      # so no explicit readinessCheck is needed — the controller's default
      # conditions fallback handles it.
